<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise 🎉</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  text-align: center;
  color: white;
  font-family: Arial;
}

button {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 15px 25px;
  font-size: 18px;
  cursor: pointer;
}

#message {
  position: absolute;
  width: 100%;
  top: 70%;
  font-size: 28px;
  white-space: pre-line;
}

#photo {
  position: absolute;
  top: 18%;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  border-radius: 15px;
  display: none;
  box-shadow: 0 0 20px white;
}

.heart {
  position: absolute;
  color: pink;
  font-size: 20px;
  animation: floatUp 4s linear infinite;
}

@keyframes floatUp {
  0% {
    transform: translateY(0);
    opacity: 1;
  }
  100% {
    transform: translateY(-600px);
    opacity: 0;
  }
}
</style>
</head>

<body>

<button onclick="startShow()">Click for Surprise 🎁</button>

<canvas id="canvas"></canvas>

<img id="photo" src="https://github.com/BhagyashreeVerma/birthday-surprise/blob/main/dad.JPG?raw=true">

<h1 id="message"></h1>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let fireworks = [];

function createFirework() {
  let x = Math.random() * canvas.width;
  let y = Math.random() * canvas.height / 2;

  for (let i = 0; i < 50; i++) {
    fireworks.push({
      x: x,
      y: y,
      dx: (Math.random() - 0.5) * 5,
      dy: (Math.random() - 0.5) * 5,
      life: 100
    });
  }
}

function drawFireworks() {
  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < fireworks.length; i++) {
    let f = fireworks[i];
    ctx.beginPath();
    ctx.arc(f.x, f.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = "hsl(" + Math.random() * 360 + ",100%,50%)";
    ctx.fill();

    f.x += f.dx;
    f.y += f.dy;
    f.life--;

    if (f.life <= 0) {
      fireworks.splice(i, 1);
      i--;
    }
  }
}

function animate() {
  requestAnimationFrame(animate);
  drawFireworks();
}

function startShow() {
  document.querySelector("button").style.display = "none";

  let count = 5;
  let msg = document.getElementById("message");

  let countdown = setInterval(() => {
    msg.innerHTML = "Loading surprise... " + count;
    count--;
    if (count < 0) {
      clearInterval(countdown);
      startFireworks();
    }
  }, 1000);
}

function startFireworks() {
  let msg = document.getElementById("message");
  msg.innerHTML = "🎆 Enjoy the fireworks! 🎆";

  let fireInterval = setInterval(() => {
    createFirework();
  }, 500);

  setTimeout(() => {
    clearInterval(fireInterval);
    showFinal();
  }, 6000);
}

// 💖 Floating Hearts
function createHearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = window.innerHeight + "px";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 4000);
  }, 300);
}

function showFinal() {
  document.getElementById("photo").style.display = "block";
  createHearts();

  let text = "🎉 Happy Birthday Pappa! 🎉\nYou are our hero,\nour biggest strength and support ❤️";
  let i = 0;
  let msg = document.getElementById("message");
  msg.innerHTML = "";

  let typing = setInterval(() => {
    msg.innerHTML += text.charAt(i);
    i++;
    if (i >= text.length) clearInterval(typing);
  }, 50);
}

animate();
</script>

</body>
</html>
