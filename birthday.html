<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title>

<style>
body {
  text-align: center;
  background: black;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

button {
  margin-top: 100px;
  padding: 15px 25px;
  font-size: 18px;
}

/* 📸 Fade-in effect */
img {
  width: 250px;
  margin-top: 20px;
  border-radius: 15px;
  opacity: 0;
  transition: opacity 1.5s ease;
}

/* ❤️ Hearts */
.heart {
  position: absolute;
  color: pink;
  font-size: 20px;
  animation: floatUp 3s linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-500px); opacity: 0; }
}

#msg {
  font-size: 24px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h2>Click for a surprise 🎁</h2>

<button onclick="show()">Click Me</button>

<br>

<img id="photo" src="dad.JPG">

<div id="msg"></div>

<script>
function show() {
  // Show photo with fade
  let photo = document.getElementById("photo");
  photo.style.opacity = 1;

  // Show message
  document.getElementById("msg").innerHTML =
  "🎉 Happy Birthday Pappa! 🎉<br>You are our hero,\n our biggest strength and support ❤️";

  // Create simple floating hearts
  for (let i = 0; i < 15; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = window.innerHeight + "px";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 3000);
  }
}
</script>

</body>
</html>
